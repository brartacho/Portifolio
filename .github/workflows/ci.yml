name: CI

on:
  pull_request:
    branches: [main, qa]
  push:
    branches: [main, qa]

jobs:
  syntax:
    name: Syntax & Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: JS syntax check (api/, dev-server, scripts/)
        run: |
          set -e
          fail=0
          for f in $(find api dev-server.mjs scripts -type f \( -name "*.js" -o -name "*.mjs" \) 2>/dev/null); do
            if ! node --check "$f" 2>&1; then
              echo "SYNTAX ERROR in $f"
              fail=1
            fi
          done
          exit $fail

      - name: HTML structural sanity (closing tags)
        run: |
          set -e
          fail=0
          for f in $(find . -maxdepth 3 -name "*.html" -not -path "./node_modules/*" -not -path "./.vercel/*"); do
            if ! grep -q '</html>' "$f"; then
              echo "MISSING </html> in $f"
              fail=1
            fi
            if ! grep -q '</body>' "$f"; then
              echo "MISSING </body> in $f"
              fail=1
            fi
          done
          exit $fail

      - name: Verify .env.example has all required keys
        run: |
          set -e
          required="SUPABASE_URL SUPABASE_SERVICE_KEY SUPABASE_BUCKET ADMIN_PASSWORD_HASH JWT_SECRET RESEND_API_KEY NOTIFY_EMAIL"
          fail=0
          for k in $required; do
            if ! grep -q "^${k}=" .env.example; then
              echo "MISSING $k in .env.example"
              fail=1
            fi
          done
          exit $fail

      - name: Verify api endpoints have CORS handling
        run: |
          set -e
          fail=0
          for f in api/admin/*.js api/cv/*.js; do
            # endpoints públicos devem ter OPTIONS handling
            if ! grep -q "OPTIONS" "$f"; then
              echo "WARN: $f não trata OPTIONS (CORS preflight)"
              # warn only, não falha
            fi
          done
