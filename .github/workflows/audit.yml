name: Visual Audit

on:
  push:
    branches: [main, qa]
    paths:
      - '**.html'
      - 'style.css'
      - 'script.js'
      - 'audit.mjs'
  pull_request:
    branches: [main, qa]
    paths:
      - '**.html'
      - 'style.css'
      - 'script.js'
      - 'audit.mjs'

jobs:
  audit:
    name: Layout & Overflow Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start static server
        run: npx serve -p 8787 -L . &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://localhost:8787 --timeout 15000

      - name: Run visual audit
        run: node audit.mjs
        env:
          AUDIT_BASE_URL: http://localhost:8787

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-screenshots-${{ github.sha }}
          path: audit-screenshots/
          retention-days: 14
